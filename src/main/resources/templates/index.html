<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Excel to Jasper Converter</title>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container py-5">
    <h1 class="mb-4">Excel to Jasper (JRXML) Converter</h1>

    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <div class="card mb-4" th:if="${sheetNames == null}">
        <div class="card-header">Upload Excel File</div>
        <div class="card-body">
            <form action="/list-sheets" method="post" enctype="multipart/form-data" class="row g-3">
                <div class="col-auto">
                    <input type="file" name="file" class="form-control" accept=".xlsx" required>
                </div>
                <div class="col-auto">
                    <button type="submit" class="btn btn-primary">List Sheets</button>
                </div>
            </form>
        </div>
    </div>

    <div class="card" th:if="${sheetNames != null}">
        <div class="card-header">
            Convert <b><span th:text="${fileName}"></span></b>
        </div>
        <div class="card-body">
            <form action="/convert" method="post" class="row g-3">
                <div class="col-md-6">
                    <label class="form-label">Select Sheet</label>
                    <select name="sheetName" class="form-select">
                        <option th:each="sheet : ${sheetNames}" th:value="${sheet}" th:text="${sheet}"></option>
                    </select>
                </div>

                <div class="col-md-3">
                    <label class="form-label">Header Start Row (0-indexed)</label>
                    <input type="number" name="headerStartRow" class="form-control" value="0" required>
                </div>

                <div class="col-md-3">
                    <label class="form-label">Header Row Count</label>
                    <input type="number" name="headerRowCount" class="form-control" value="2" required>
                </div>

                <div class="col-12 mt-4">
                    <button type="submit" class="btn btn-success">Convert and Download JRXML</button>
                    <a href="/" class="btn btn-secondary">Upload different file</a>
                </div>
            </form>
        </div>
    </div>

</body>
</html>
