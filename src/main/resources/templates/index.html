<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Excel to Jasper Converter</title>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .hidden { display: none; }
        .card { transition: all 0.3s ease; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    </style>
</head>
<body class="bg-light min-vh-100 py-5">
    <div class="container">
        <div class="row align-items-center mb-5">
            <div class="col-lg-7">
                <h1 class="text-primary fw-bold m-0">Excel to Jasper (JRXML) Pro</h1>
            </div>
            <div class="col-lg-5 text-end">
                <form action="/set-license" method="post" class="d-inline-flex gap-2">
                    <input type="text" name="license" class="form-control form-control-sm" placeholder="License Key" th:value="${license}">
                    <button type="submit" class="btn btn-dark btn-sm">Activate</button>
                </form>
                <div class="mt-1">
                    <span th:if="${isPro}" class="badge bg-success">Activated (PRO)</span>
                    <span th:unless="${isPro}" class="badge bg-secondary" th:text="'Trial Usage: ' + ${usageCount} + '/' + ${freeLimit}"></span>
                </div>
            </div>
        </div>

        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <div th:if="${success}" class="alert alert-success alert-dismissible fade show text-center" role="alert">
            <h4 class="alert-heading">Success!</h4>
            <p th:text="${success}"></p>
            <hr>
            <a href="/download" class="btn btn-success btn-lg px-5 fw-bold shadow">
                <i class="bi bi-download"></i> Download Generated JRXML
            </a>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <div class="row justify-content-center">
            <!-- Step 1: Upload -->
            <div class="col-md-8 mb-4" th:if="${sheetNames == null}">
                <div class="card shadow-sm border-0">
                    <div class="card-header bg-primary text-white py-3">
                        <h5 class="mb-0">1. Upload Excel File (.xlsx)</h5>
                    </div>
                    <div class="card-body p-4">
                        <form action="/list-sheets" method="post" enctype="multipart/form-data" class="row g-3 align-items-center">
                            <div class="col-md-9">
                                <input type="file" name="file" class="form-control form-control-lg" accept=".xlsx" required>
                            </div>
                            <div class="col-md-3">
                                <button type="submit" class="btn btn-primary btn-lg w-100">Analyze</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>

            <!-- Step 2: Configure & Convert -->
            <div class="col-md-10 mb-4" th:if="${sheetNames != null}">
                <div class="card shadow-sm border-0">
                    <div class="card-header bg-success text-white py-3 d-flex justify-content-between align-items-center">
                        <h5 class="mb-0">2. Configure Conversion: <b th:text="${fileName}"></b></h5>
                        <a href="/reset" class="btn btn-sm btn-light">New Upload</a>
                    </div>
                    <div class="card-body p-4">
                        <form id="convertForm" action="/convert" method="post" class="row g-4">
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Select Sheet</label>
                                <select name="sheetName" class="form-select form-select-lg shadow-sm">
                                    <option th:each="sheet : ${sheetNames}" th:value="${sheet}" th:text="${sheet}"></option>
                                </select>
                            </div>

                            <div class="col-md-3">
                                <label class="form-label fw-bold">Header Start Row (0-indexed)</label>
                                <input type="number" name="headerStartRow" class="form-control form-control-lg shadow-sm" value="0" required>
                            </div>

                            <div class="col-md-3">
                                <label class="form-label fw-bold">Header Row Count</label>
                                <input type="number" name="headerRowCount" class="form-control form-control-lg shadow-sm" value="2" required>
                            </div>

                            <div class="col-12 mt-5 text-center">
                                <button type="submit" id="convertBtn" class="btn btn-success btn-lg px-5 shadow">
                                    Convert to JRXML
                                </button>
                                <div id="loader" class="hidden mt-4">
                                    <div class="spinner-border text-success" role="status">
                                        <span class="visually-hidden">Loading...</span>
                                    </div>
                                    <p class="mt-2 text-muted fst-italic">Generating report structure, please wait...</p>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>

            <!-- Step 3: Result Summary (if download is available) -->
            <div class="col-md-8 mb-4 text-center" th:if="${downloadAvailable}">
                 <div class="card shadow-sm border-success border-2">
                    <div class="card-body p-4">
                        <h5 class="text-success fw-bold mb-3">Report Ready</h5>
                        <p class="text-muted">Generated file: <b th:text="${jrxmlFileName}"></b></p>
                        <a href="/download" class="btn btn-success btn-lg px-5 fw-bold shadow pulse">
                            Download Now
                        </a>
                        <div class="mt-3">
                            <a href="/reset" class="text-secondary small">Start Over</a>
                        </div>
                    </div>
                 </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        document.getElementById('convertForm')?.addEventListener('submit', function() {
            const btn = document.getElementById('convertBtn');
            const loader = document.getElementById('loader');

            btn.classList.add('disabled');
            btn.innerHTML = 'Processing...';
            loader.classList.remove('hidden');
        });
    </script>

</body>
</html>
